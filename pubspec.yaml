name: evlumba_mobile
description: "Evlumba - Interior Design Platform Mobile App"
publish_to: 'none'

version: 1.0.13+14

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.0
  go_router: ^14.6.3
  flutter_riverpod: ^2.6.1
  cached_network_image: ^3.4.1
  google_sign_in: ^6.2.2
  intl: ^0.19.0
  url_launcher: ^6.3.1
  flutter_dotenv: ^5.2.1
  image_picker: ^1.1.2
  shimmer: ^3.0.0
  timeago: ^3.7.0
  http: ^1.2.0
  webview_flutter: ^4.10.0
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icon/
    - assets/splash.png
    - assets/splash1.png
    - assets/web_icon2.png
